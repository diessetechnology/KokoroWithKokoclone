services:
  # Kokoro TTS - CPU-only API. Private by default.
  kokoro:
    image: ${KOKORO_IMAGE:-ghcr.io/remsky/kokoro-fastapi-cpu:latest}
    restart: unless-stopped
    expose:
      - "8880"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kokoro-api.rule=Host(`${KOKORO_API_HOST}`)"
      - "traefik.http.services.kokoro-api.loadbalancer.server.port=8880"
      - "traefik.http.middlewares.api-auth.basicauth.users=${BASIC_AUTH_USERS}"
      - "traefik.http.middlewares.api-auth.basicauth.realm=Voice API"
      - "traefik.http.routers.kokoro-api.middlewares=api-auth@docker"      
    environment:
      PYTHONUNBUFFERED: "1"
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-4}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-4}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-4}
      NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-4}
      WORKERS: ${UVICORN_WORKERS:-1}
    volumes:
      - kokoro_cache:/root/.cache
      - kokoro_data:/app/data
    security_opt:
      - no-new-privileges:true

  # KokoClone API - CPU-capable API image. Private by default.
  kokoclone-api:
    image: ${KOKOCLONE_IMAGE:-k8bit/kokoclone:latest}
    restart: unless-stopped
    expose:
      - "8000"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kokoro-api.rule=Host(`${KOKORO_API_HOST}`)"
      - "traefik.http.services.kokoro-api.loadbalancer.server.port=8880"
      - "traefik.http.middlewares.api-auth.basicauth.users=${BASIC_AUTH_USERS}"
      - "traefik.http.middlewares.api-auth.basicauth.realm=Voice API"
      - "traefik.http.routers.kokoro-api.middlewares=api-auth@docker"
    environment:
      PYTHONUNBUFFERED: "1"
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-4}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-4}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-4}
      NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-4}
    volumes:
      - kokoclone_cache:/root/.cache
      - kokoclone_outputs:/app/outputs
    security_opt:
      - no-new-privileges:true

  # Ultravox via llama.cpp server - CPU-only, Q4_K_M quantized.
  ultravox:
    image: ${ULTRAVOX_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    restart: unless-stopped
    expose:
      - "8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kokoro-api.rule=Host(`${KOKORO_API_HOST}`)"
      - "traefik.http.services.kokoro-api.loadbalancer.server.port=8880"
      - "traefik.http.middlewares.api-auth.basicauth.users=${BASIC_AUTH_USERS}"
      - "traefik.http.middlewares.api-auth.basicauth.realm=Voice API"
      - "traefik.http.routers.kokoro-api.middlewares=api-auth@docker"
    environment:
      LLAMA_ARG_HF_REPO: ${ULTRAVOX_HF_REPO:-ggml-org/ultravox-v0_5-llama-3_2-1b-GGUF}
      LLAMA_ARG_HF_FILE: ${ULTRAVOX_HF_FILE:-Llama-3.2-1B-Instruct-Q4_K_M.gguf}
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: 8080
      LLAMA_ARG_CTX_SIZE: ${ULTRAVOX_CTX:-2048}
      LLAMA_ARG_THREADS: ${ULTRAVOX_THREADS:-4}
      LLAMA_ARG_BATCH: ${ULTRAVOX_BATCH:-64}
      LLAMA_ARG_UBATCH: ${ULTRAVOX_UBATCH:-64}
      LLAMA_ARG_NO_MMAP: "false"
    volumes:
      - ultravox_models:/models
      - ultravox_cache:/root/.cache
    security_opt:
      - no-new-privileges:true

  # One public UI for Kokoro, KokoClone and Ultravox.
  voice-hub-ui:
    build:
      context: ./voice-hub-ui
    restart: unless-stopped
    expose:
      - "7860"
    environment:
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 7860
      GRADIO_ANALYTICS_ENABLED: "False"
      KOKORO_API_BASE: http://kokoro:8880
      KOKOCLONE_API_BASE: http://kokoclone-api:8000
      ULTRAVOX_API_BASE: http://ultravox:8080
    labels:
      # If Coolify/Dokploy manages domains from UI, you can leave only the service port label
      # or remove all router labels and set domain -> service voice-hub-ui -> port 7860 in the UI.
      - "traefik.enable=true"
      - "traefik.http.routers.voice-hub-ui.rule=Host(`${VOICE_UI_HOST}`)"
      - "traefik.http.services.voice-hub-ui.loadbalancer.server.port=7860"
      - "traefik.http.middlewares.voice-auth.basicauth.users=${BASIC_AUTH_USERS}"
      - "traefik.http.middlewares.voice-auth.basicauth.realm=Voice Hub"
      - "traefik.http.routers.voice-hub-ui.middlewares=voice-auth@docker"
    depends_on:
      - kokoro
      - kokoclone-api
      - ultravox
    security_opt:
      - no-new-privileges:true

volumes:
  kokoro_cache:
  kokoro_data:
  kokoclone_cache:
  kokoclone_outputs:
  ultravox_models:
  ultravox_cache:
